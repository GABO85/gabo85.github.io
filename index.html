<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Courier New', monospace;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
            padding: 20px;
        }

        /* Simple ASCII logo */
        .ascii {
            color: #00ff41;
            font-size: 15px;
            margin-bottom: 50px;
            white-space: pre;
            font-family: monospace;
            opacity: 0.8;
	    /*justify-content: center;*/
        }

        /* Button container */
        .buttons {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* Minimalist buttons */
        .btn {
            background: transparent;
            border: 1.5px solid #00ff41;
            color: #00ff41;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-family: monospace;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            letter-spacing: 2px;
        }

        .btn:hover {
            background: #00ff41;
            color: #0a0a0a;
            transform: translateY(-2px);
        }

        /* Footer */
        .footer {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            color: #333;
            font-size: 0.8rem;
            font-family: monospace;
        }

        /* Mobile responsive */
        @media (max-width: 600px) {
            .buttons {
                gap: 20px;
                flex-direction: column;
            }
            .btn {
                padding: 12px 30px;
                font-size: 1rem;
            }
            .ascii {
                font-size: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Simple ASCII art -->
        <div class="ascii">
    
|	P O R T F O L I O	|
    
        </div>

        <!-- Two buttons only -->
        <div class="buttons">
            <a href="/about" class="btn">ABOUT</a>
            <a href="/writeups" class="btn">WRITEUPS</a>
        </div>

        <div class="footer">
		<!--  <span>$ whoami</span> <!-- Just a subtle touch -->-->
        </div>
    </div>
</body>
</html>
